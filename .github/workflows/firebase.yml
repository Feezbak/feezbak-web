# This workflow will carry out a clean installation of node dependencies,
# cache/restore them, build the source code and run tests across different
# versions of node
# For more information see:
# https://docs.github.com/en/actions/automating-builds-and-tests
# /building-and-testing-nodejs

name: Firebase CI

on:
   push:
      branches: [develop]

jobs:
   build:
      runs-on: ubuntu-latest

      strategy:
         matrix:
            node-version: [14.x]

      steps:
         - name: Checkout code
           uses: actions/checkout@v2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v1
        with:
           node-version: ${{ matrix.node-version }}

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies, build, and test
        run: |
          npm install
          npm run build

      - name: Archive Build
        uses: actions/upload-artifact@v2
        with:
           name: build
           path: build

   deploy:
      name: Deploy
      needs: build
      runs-on: ubuntu-latest

      steps:
         - name: Checkout code
           uses: actions/checkout@v2

      - name: Download Build
        uses: actions/download-artifact@v2
        with:
           name: build
           path: build

      - name: Deploy to Firebase
        run: npm install -g firebase-tools
        env:
           FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
           NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Firebase Deploy
        run: npx firebase deploy --only hosting
        env:
           FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
