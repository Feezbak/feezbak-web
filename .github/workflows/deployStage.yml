name: Deploy Workflow

on:
  push:
    branches:
      - develop  # Replace with the branch you want to trigger this workflow

jobs:
  deploy:
    runs-on: Digital_Ocean

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Change directory
        run: cd apps/feezbak-web-stage
        
      - name: Git Checkout Develop
        run: git checkout develop

      - name: Git Pull
        run: git pull origin develop

      - name: Install Dependencies
        run: yarn

      - name: Build
        run: yarn build