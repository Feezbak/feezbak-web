name: Lighthouse
on:
 pull_request:
       branches:
          - develop

jobs:
    lighthouse:
       runs-on: ubuntu-latest
       steps:
          - uses: actions/checkout@v2

          - name: Setup node
            uses: actions/setup-node@v1
            with:
              node-version: "16.x"

          - name: Install
            run: yarn install --frozen-lockfile && yarn global add http-server @lhci/cli

          - name: Build
            run: yarn run build

          - name: LighthouseCI
            run: lhci autorun