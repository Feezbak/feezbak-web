name: Lighthouse Report Comment

on:
   pull_request:
      branches:
         - develop

jobs:
   lighthouse:
      runs-on: ubuntu-latest

      steps:
         - uses: actions/checkout@v2

         - name: Lighthouse CI Action
           uses: foo-software/lighthouse-check-action@master
           with:
             urls: 'https://www.foo.software,https://www.google.com'

         - name: Create Comment
           uses: actions/github-script@v4
           with:
             github-token: ${{ secrets.GITHUB_TOKEN }}
             script: |
               const fs = require('fs');
               const report = fs.readFileSync('.lighthouseci/lighthouse/report.html', 'utf8');
               const payload = {
                 owner: context.repo.owner,
                 repo: context.repo.repo,
                 issue_number: context.issue.number,
                 body: 'Lighthouse Report:\n\n' + report
               };
               await github.rest.issues.createComment(payload);
