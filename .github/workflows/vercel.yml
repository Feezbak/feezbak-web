name: Deploy to Vercel

on:
   push:
      branches:
         - develop

jobs:
   deploy:
      runs-on: ubuntu-latest

      steps:
         - name: Checkout code
           uses: actions/checkout@v2

         - name: Set up Node.js
           uses: actions/setup-node@v2
           with:
             node-version: 14

         - name: Install dependencies
           run: yarn install --frozen-lockfile

         - name: Build app
           run: yarn build

         - name: Deploy to Vercel
           uses: amondnet/vercel-action@v20
           with:
             vercel-token: ${{ secrets.VERCEL_TOKEN }}
             vercel-org-id: team_wcqizioYkKi2s8HsNjARH7MI
             vercel-project-id: prj_xXjKu1KILrGi6fb5Qp7jXvvKFxV3
