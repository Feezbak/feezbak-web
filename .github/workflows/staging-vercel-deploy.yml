name: Vercel Deployment

on:
   workflow_run:
      workflows:
         - Docker Build
      types:
         - completed

jobs:
   deploy:
      if: ${{ github.event.workflow_run.conclusion == 'success' }}
      runs-on: ubuntu-latest
      steps:
         - name: Checkout code
           uses: actions/checkout@v2

         - name: Deploy to Vercel
           uses: vercel/github-action@v21
           with:
             vercel_token: ${{ secrets.VERCEL_TOKEN }}