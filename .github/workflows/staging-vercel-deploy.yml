name: Vercel Deployment

on:
   workflow_run:
      workflows:
         - Docker Build
      types:
         - completed

jobs:
   deploy:
      if: ${{ github.event.workflow_run.conclusion == 'success' }}
      runs-on: ubuntu-latest
      steps:
         - name: Checkout code
           uses: actions/checkout@v2

         - name: Install Vercel CLI
           run: yarn global add vercel

         - name: Check and Create Scope
           env:
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
           run: |
            SCOPE_NAME="feezbak"
            if ! vercel scopes ls | grep -q "$SCOPE_NAME"; then
              echo "Creating scope: $SCOPE_NAME"
              vercel scopes add "$SCOPE_NAME"
            fi

         - name: Deploy to Vercel
           env:
             VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
           run: |
             echo "Y" | vercel --token $VERCEL_TOKEN --scope $SCOPE_NAME