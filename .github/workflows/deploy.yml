name: Deploy to Digital Ocean

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install SSH key
      run: |
        echo "$SSH_PRIVATE_KEY" > ssh_key
        chmod 600 ssh_key
        eval $(ssh-agent -s)
        ssh-add ssh_key

    - name: Deploy to Digital Ocean
      run: |
        ssh -i ssh_key user@${{ secrets.DO_DROPLET_IP }}  'cd apps/feezbak-web && git pull origin master && yarn install && yarn build'

