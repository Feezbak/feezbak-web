name: Deploy to Digital Ocean

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: 14

    - name: Install Dependencies
      run: yarn install

    - name: Build
      run: yarn build

    - name: Deploy to Digital Ocean
      run: scp -r build/* username@your-droplet-ip:/path/to/your/web/root

    - name: SSH into Droplet
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DROPLET_IP }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: 'cd /path/to/your/web/root && rm -rf * && mv /path/to/your/web/root/build/* ./'
