<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ─── Primary ─── -->
    <title>Feezbak — Beautiful Feedback Stories</title>
    <meta
      name="description"
      content="Create visual feedback stories, share them in one link, and collect real-time votes and comments. The feedback tool built for designers, marketers, and product teams."
    />
    <meta name="theme-color" content="#FF7F61" />

    <!-- ─── Open Graph (Facebook, LinkedIn, WhatsApp, iMessage, Slack …) ─── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://feezbak.com" />
    <meta property="og:site_name" content="Feezbak" />
    <meta
      property="og:title"
      content="Feezbak — Beautiful Feedback Stories"
    />
    <meta
      property="og:description"
      content="Create visual feedback stories, share them in one link, and collect real-time votes and comments. The feedback tool built for designers, marketers, and product teams."
    />
    <meta property="og:image" content="https://feezbak.com/og-image.png" />
    <meta property="og:image:width" content="2000" />
    <meta property="og:image:height" content="2000" />
    <meta property="og:image:alt" content="Feezbak — Beautiful Feedback Stories" />
    <meta property="og:locale" content="en_US" />

    <!-- ─── Twitter / X Card ─── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@feezbak" />
    <meta
      name="twitter:title"
      content="Feezbak — Beautiful Feedback Stories"
    />
    <meta
      name="twitter:description"
      content="Create visual feedback stories, share them in one link, and collect real-time votes and comments."
    />
    <meta name="twitter:image" content="https://feezbak.com/og-image.png" />

    <!-- ─── Favicons ─── -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />

    <!-- ─── PWA manifest ─── -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ─── Slick carousel ─── -->
    <link
      rel="stylesheet"
      type="text/css"
      charset="UTF-8"
      href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.6.0/slick.min.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.6.0/slick-theme.min.css"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
